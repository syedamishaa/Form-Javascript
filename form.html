<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Student Entry Form</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <form class="form-container" id="entryform">
    <h1>Student Entry Form</h1>
    <p>Fill the details below</p>

    <div class="grid">
      <div>
        <label for="fullName">Full Name *</label>
        <input  id="fullName" type="text" placeholder="e.g. Syeda mishaa" required>
      </div>

      <div>
        <label for="roll">Roll Number *</label>
        <input  id="roll" type="text" placeholder="e.g. R-2025-001" required>
      </div>

      <div>
        <label for="classSel">Class / Grade *</label>
        <select id="classSel" required>
          <option hidden>Select class</option>
          <option>9</option>
          <option>10</option>
          <option>11</option>
          <option>12</option>
        </select>
      </div>

      <div>
        <label for="dob">Date of Birth</label>
        <input id="dob"  type="date">
      </div>

      <div>
        <label for="email">Email</label>
        <input  id="email" type="email" placeholder="name@example.com">
      </div>

      <div>
        <label for="phone">Phone</label>
        <input  id="phone" type="tel" placeholder="+92 300 1234567" pattern="^\+?[0-9\s-]{7,20}$">
      </div>

      <div class="full">
        <label for="address">Address</label>
        <textarea  id="address" placeholder="Street, city, postal code..."></textarea>
      </div>

      <div>
        <label>Gender</label>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="Female"> Female</label>
          <label><input type="radio" name="gender" value="Male"> Male</label>
          <label><input type="radio" name="gender" value="Other"> Other</label>
        </div>
      </div>

      <div>
        <label for="stream">Enrolled Stream</label>
        <select id="stream">
          <option hidden>General</option>
          <option>Science</option>
          <option>Commerce</option>
          <option>Arts</option>
          <option>Computer Science</option>
        </select>
      </div>

      <div class="full">
        <label for="notes">Notes / Remarks</label>
        <textarea id="notes" name="notes" placeholder="Any special notes (allergies, guardianship, etc.)"></textarea>
      </div>
    </div>

    <div class="actions">
      <button type="reset" class="btn btn-reset">Reset</button>
      <button type="button" onclick="addStudent()">Submit</button>
    </div>
  </form>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Roll No</th>
        <th>Class / Grade</th>
        <th>Date of Birth</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Address</th>
        <th>Gender</th>
        <th>Enrolled</th>
        <th>Notes</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="studentlist">
    </tbody>
  </table>
<script src="script.js"></script>
</body>
</html>
